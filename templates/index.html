<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineBot</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Mono:wght@300;400&display=swap"
        rel="stylesheet">
    <link href="{{ url_for('static', filename='style.css') }}" rel="stylesheet">
</head>

<body>
    <div class="container">
        <div class="filmstrip">
            <div class="filmstrip-hole"></div>
            <div class="filmstrip-hole"></div>
            <div class="filmstrip-hole"></div>
            <div class="filmstrip-line"></div>
            <div class="filmstrip-hole"></div>
            <div class="filmstrip-hole"></div>
            <div class="filmstrip-hole"></div>
        </div>

        <header>
            <div class="logo">
                <h1>Cine<span>Bot</span></h1>

            </div>
            <div class="header-controls">
                <button id="theme-toggle" title="Toggle dark/light mode">◑</button>
                <label class="debug-label">
                    <input type="checkbox" id="debug-toggle" checked> Debug
                </label>
                <button id="reset-btn">↺ Reset</button>
            </div>
        </header>

        <div id="chat"></div>

        <div class="footer-line"></div>
        <div class="input-area">
            <span class="input-icon">›</span>
            <input id="input" type="text" placeholder="Try: 'Recommend me a sci-fi movie' or 'Tell me about Inception'"
                autofocus>
            <button id="send">Send</button>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>

</html>
